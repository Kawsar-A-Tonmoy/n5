<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Vocab Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&amp;family=Inter:wght@400;500;600&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .jp-font { font-family: 'Noto Sans JP', sans-serif; }
        
        .vocab-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .vocab-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
        }

        #quiz-japanese {
            transition: all 0.3s;
        }
        #quiz-japanese.clickable {
            cursor: pointer;
        }
        #quiz-japanese.clickable:hover {
            color: #ef4444;
        }

        @media (max-width: 640px) {
            #quiz-japanese { font-size: 2.5rem; }
            .input-field { font-size: 1.1rem; padding: 1rem 1.25rem; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-6xl mx-auto p-4 sm:p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8 sm:mb-10">
            <div class="flex items-center gap-3 sm:gap-4">
                <div class="w-10 h-10 sm:w-12 sm:h-12 bg-red-500 rounded-2xl flex items-center justify-center text-white text-3xl font-bold">日</div>
                <div>
                    <h1 class="text-3xl sm:text-4xl font-bold tracking-tight">Japanese Vocab</h1>
                    <p class="text-gray-500 text-sm sm:text-base">Learn with flashcards & quiz</p>
                </div>
            </div>
            
            <button onclick="toggleView()" id="view-toggle"
                    class="px-5 py-3 bg-white border-2 border-gray-300 hover:border-red-400 rounded-3xl flex items-center gap-2 sm:gap-3 font-semibold text-base sm:text-lg transition-all">
                <i class="fas fa-gamepad"></i>
                <span id="toggle-text" class="hidden sm:inline">Start Quiz Mode</span>
                <span class="sm:hidden">Quiz</span>
            </button>
        </div>

        <!-- LIST VIEW -->
        <div id="list-view">
            <div class="bg-white p-5 sm:p-6 rounded-3xl shadow-sm mb-8">
                <div class="flex flex-wrap items-center gap-3">
                    <span class="font-medium text-gray-600">Filter Lessons:</span>
                    <button onclick="toggleAllLessons(true)" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-2xl text-sm font-medium">All</button>
                    <button onclick="toggleAllLessons(false)" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-2xl text-sm font-medium">None</button>
                    <div class="flex flex-wrap gap-2 ml-4" id="lesson-filters"></div>
                </div>
            </div>

            <div id="vocab-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6"></div>
        </div>

        <!-- QUIZ VIEW -->
        <div id="quiz-view" class="hidden">
            <div class="max-w-2xl mx-auto flex flex-col min-h-[calc(100vh-100px)]">
                <!-- Progress -->
                <div class="bg-white rounded-3xl p-4 sm:p-5 mb-6 flex justify-between items-center">
                    <div class="flex-1">
                        <div class="text-sm text-gray-500 mb-1">Progress</div>
                        <div class="flex items-center gap-3">
                            <div class="flex-1 h-3 bg-gray-100 rounded-full overflow-hidden">
                                <div id="progress-bar" class="h-full bg-red-500 transition-all duration-300" style="width: 0%"></div>
                            </div>
                            <span id="progress-text" class="font-mono font-semibold text-sm">1 / 10</span>
                        </div>
                    </div>
                    <button onclick="endQuiz()" class="ml-4 text-red-600 hover:bg-red-50 px-4 py-2 rounded-2xl flex items-center gap-2">
                        <i class="fas fa-times"></i> <span class="hidden sm:inline">End</span>
                    </button>
                </div>

                <!-- Main Quiz Card -->
                <div class="bg-white rounded-3xl shadow-2xl p-6 sm:p-8 flex-1 flex flex-col">
                    <div class="text-center mb-8">
                        <div id="current-lesson" class="inline-block px-5 py-2 bg-amber-100 text-amber-700 rounded-3xl text-sm font-medium"></div>
                        <div class="mt-8">
                            <div class="text-gray-400 text-sm mb-2 tracking-widest">JAPANESE</div>
                            <div id="quiz-japanese" class="jp-font text-5xl sm:text-6xl font-medium text-gray-800"></div>
                        </div>
                    </div>

                    <div class="space-y-6 flex-1">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-3">Pronunciation (Romaji)</label>
                            <input id="input-romaji" type="text" placeholder="watashi" 
                                   class="input-field w-full px-6 py-5 text-xl sm:text-2xl border-2 border-gray-200 focus:border-red-400 rounded-3xl outline-none">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-3">Meaning (English or বাংলা)</label>
                            <input id="input-meaning" type="text" placeholder="I / আমি" 
                                   class="input-field w-full px-6 py-5 text-xl sm:text-2xl border-2 border-gray-200 focus:border-red-400 rounded-3xl outline-none">
                        </div>
                    </div>

                    <div id="feedback" class="hidden mt-6 p-6 rounded-2xl text-center text-lg font-medium"></div>

                    <div class="flex flex-col sm:flex-row gap-4 mt-8">
                        <button onclick="submitAnswer()" id="check-btn"
                                class="flex-1 py-5 sm:py-6 bg-red-500 hover:bg-red-600 text-white rounded-3xl font-semibold text-lg transition-all">
                            Check Answer
                        </button>
                        <button onclick="skipWord()" id="skip-btn"
                                class="hidden flex-1 py-5 sm:py-6 bg-gray-700 hover:bg-gray-800 text-white rounded-3xl font-semibold text-lg">
                            Skip
                        </button>
                        <button onclick="revealAnswer()" id="reveal-btn"
                                class="hidden flex-1 py-5 sm:py-6 bg-amber-600 hover:bg-amber-700 text-white rounded-3xl font-semibold text-lg">
                            Reveal Answer
                        </button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="bg-white rounded-3xl p-5 sm:p-6 mt-6 grid grid-cols-3 gap-4 shadow-sm">
                    <div class="text-center">
                        <div id="correct-count" class="text-3xl sm:text-4xl font-bold text-green-500">0</div>
                        <div class="text-xs text-gray-500 font-medium">CORRECT</div>
                    </div>
                    <div class="text-center">
                        <div id="incorrect-count" class="text-3xl sm:text-4xl font-bold text-red-500">0</div>
                        <div class="text-xs text-gray-500 font-medium">INCORRECT</div>
                    </div>
                    <div class="text-center">
                        <div id="accuracy" class="text-3xl sm:text-4xl font-bold text-blue-500">100%</div>
                        <div class="text-xs text-gray-500 font-medium">ACCURACY</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Lesson Selection Modal -->
    <div id="lesson-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg">
            <div class="p-6 sm:p-8">
                <h2 class="text-3xl font-bold mb-2">Start New Quiz</h2>
                <p class="text-gray-500">Select lessons to practice</p>
                <div id="modal-lesson-list" class="my-8 space-y-3 max-h-[420px] overflow-auto"></div>
                <div class="flex gap-4">
                    <button onclick="cancelModal()" class="flex-1 py-4 border border-gray-300 rounded-3xl hover:bg-gray-100 font-medium">Cancel</button>
                    <button onclick="startQuiz()" class="flex-1 py-4 bg-red-500 text-white rounded-3xl font-semibold">Start Quiz</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Completion Modal -->
    <div id="completion-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl w-full max-w-md">
            <div class="p-8 sm:p-10 text-center">
                <div class="text-7xl mb-6">🎉</div>
                <h2 class="text-3xl font-bold mb-2">Quiz Completed!</h2>
                <p class="text-gray-500 mb-8">Excellent effort!</p>

                <div class="grid grid-cols-3 gap-4 mb-10">
                    <div class="bg-green-50 rounded-2xl p-5">
                        <div id="final-correct" class="text-4xl font-bold text-green-600">0</div>
                        <div class="text-sm text-green-600">Correct</div>
                    </div>
                    <div class="bg-red-50 rounded-2xl p-5">
                        <div id="final-incorrect" class="text-4xl font-bold text-red-600">0</div>
                        <div class="text-sm text-red-600">Incorrect</div>
                    </div>
                    <div class="bg-blue-50 rounded-2xl p-5">
                        <div id="final-accuracy" class="text-4xl font-bold text-blue-600">100%</div>
                        <div class="text-sm text-blue-600">Accuracy</div>
                    </div>
                </div>

                <div class="space-y-3">
                    <button onclick="retryQuiz()" class="w-full py-4 bg-red-500 hover:bg-red-600 text-white rounded-3xl font-semibold text-lg">Retry Same Lessons</button>
                    <button onclick="chooseNewLessons()" class="w-full py-4 bg-gray-800 hover:bg-black text-white rounded-3xl font-semibold text-lg">Choose Different Lessons</button>
                    <button onclick="closeCompletionModal()" class="w-full py-4 border border-gray-300 hover:bg-gray-100 rounded-3xl font-medium text-lg">Back to Home</button>
                </div>
            </div>
        </div>
    </div>

  { "lesson": 10, "lessonName": "Lesson 10: Existence & Locations", "japanese": "チリソース", "romaji": "Chiri soosu", "meaningBangla": "চিলি সস্", "meaningEnglish": "Chili sauce" },
  { "lesson": 10, "lessonName": "Lesson 10: Existence & Locations", "japanese": "おく", "romaji": "Oku", "meaningBangla": "ভিতরে/পিছনে (গভীরে)", "meaningEnglish": "Back / Inner part" },
  { "lesson": 10, "lessonName": "Lesson 10: Existence & Locations", "japanese": "スパイスコーナー", "romaji": "Supaisu koonaa", "meaningBangla": "মশলার কর্ণার", "meaningEnglish": "Spice corner" },
  { "lesson": 10, "lessonName": "Lesson 10: Existence & Locations", "japanese": "とうきょうディズニーランド", "romaji": "Toukyou Dizuniirando", "meaningBangla": "টোকিও ডিজেনিল্যান্ড", "meaningEnglish": "Tokyo Disneyland" },
  { "lesson": 10, "lessonName": "Lesson 10: Existence & Locations", "japanese": "ユニューヤ", "romaji": "Yunyuuya", "meaningBangla": "ইউনিউইয়া ষ্টোর (কাল্পনিক)", "meaningEnglish": "Yunyuuya (fictional store)" },
  { "lesson": 10, "lessonName": "Lesson 10: Existence & Locations", "japanese": "ストア", "romaji": "Sutoa", "meaningBangla": "সুপার স্টোর", "meaningEnglish": "Store" },
        ];

        let selectedLessons = new Set([1,2,3,4]);
        let currentView = 'list';
        let quizQueue = [];
        let skipped = [];
        let currentIndex = 0;
        let attempts = 0;
        let correctCount = 0;
        let incorrectCount = 0;
        let currentItem = null;
        let canSpeak = false;

        function normalizeText(text) {
            if (!text) return "";
            return text.toLowerCase()
                .replace(/[?.!]/g, '')
                .replace(/\s*\(.*?\)\s*/g, '')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function isMatch(userInput, correctAnswer) {
            if (!userInput || !correctAnswer) return false;
            const user = normalizeText(userInput);
            const correct = normalizeText(correctAnswer);

            if (correct.includes('/')) {
                const options = correct.split('/').map(opt => opt.trim());
                return options.some(opt => user === opt || opt.includes(user) || user.includes(opt));
            }
            return user === correct || correct.includes(user) || user.includes(correct);
        }

        function speakJapanese(text) {
            if ('speechSynthesis' in window) {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ja-JP';
                speechSynthesis.speak(u);
            }
        }

        // ==================== RENDER FUNCTIONS ====================
        function renderLessonFilters() {
            const container = document.getElementById('lesson-filters');
            container.innerHTML = '';
            const unique = [...new Set(vocabData.map(v => v.lesson))];
            unique.forEach(num => {
                const active = selectedLessons.has(num);
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-3xl text-sm font-medium transition-all ${active ? 'bg-red-500 text-white' : 'bg-white border border-gray-300'}`;
                btn.textContent = `Lesson ${num}`;
                btn.onclick = () => {
                    if (selectedLessons.has(num)) selectedLessons.delete(num);
                    else selectedLessons.add(num);
                    renderLessonFilters();
                    renderVocabList();
                };
                container.appendChild(btn);
            });
        }

        function renderVocabList() {
            const container = document.getElementById('vocab-list');
            container.innerHTML = '';
            const filtered = vocabData.filter(v => selectedLessons.has(v.lesson));

            const grouped = {};
            filtered.forEach(item => {
                if (!grouped[item.lesson]) grouped[item.lesson] = [];
                grouped[item.lesson].push(item);
            });

            Object.keys(grouped).sort((a,b)=>a-b).forEach(lessonNum => {
                const items = grouped[lessonNum];
                const header = document.createElement('div');
                header.className = "col-span-full mt-8";
                header.innerHTML = `
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-9 h-9 bg-red-100 text-red-600 rounded-2xl flex items-center justify-center font-bold">${lessonNum}</div>
                        <h2 class="text-2xl font-semibold">${items[0].lessonName}</h2>
                    </div>`;
                container.appendChild(header);

                items.forEach(v => {
                    const card = document.createElement('div');
                    card.className = "vocab-card bg-white border border-gray-100 rounded-3xl p-6 cursor-pointer";
                    card.innerHTML = `
                        <div class="jp-font text-4xl font-medium mb-3">${v.japanese}</div>
                        <div class="text-lg font-medium">${v.romaji}</div>
                        <div class="mt-4 text-gray-600">${v.meaningEnglish}</div>
                        <div class="text-gray-700">${v.meaningBangla}</div>
                    `;
                    card.onclick = () => speakJapanese(v.japanese);
                    container.appendChild(card);
                });
            });
        }

        function renderModalLessons() {
            const container = document.getElementById('modal-lesson-list');
            container.innerHTML = '';
            const unique = [...new Set(vocabData.map(v => v.lesson))];
            unique.forEach(num => {
                const lesson = vocabData.find(v => v.lesson === num);
                const div = document.createElement('div');
                div.className = `p-5 rounded-2xl cursor-pointer flex justify-between items-center ${selectedLessons.has(num) ? 'bg-red-50 border border-red-200' : 'hover:bg-gray-50'}`;
                div.innerHTML = `
                    <div>
                        <div class="font-semibold">Lesson ${num}</div>
                        <div class="text-sm text-gray-500">${lesson.lessonName}</div>
                    </div>
                    <input type="checkbox" ${selectedLessons.has(num) ? 'checked' : ''} class="w-6 h-6 accent-red-500">
                `;
                div.onclick = (e) => {
                    if (e.target.type !== 'checkbox') {
                        selectedLessons.has(num) ? selectedLessons.delete(num) : selectedLessons.add(num);
                        renderModalLessons();
                    }
                };
                container.appendChild(div);
            });
        }

        // ==================== QUIZ FUNCTIONS ====================
        function toggleView() {
            if (currentView === 'list') {
                document.getElementById('list-view').classList.add('hidden');
                document.getElementById('lesson-modal').classList.remove('hidden');
            } else {
                endQuiz();
            }
        }

        function cancelModal() {
            document.getElementById('lesson-modal').classList.add('hidden');
            document.getElementById('list-view').classList.remove('hidden');
        }

        function startQuiz() {
            hideModal();
            const filtered = vocabData.filter(v => selectedLessons.has(v.lesson));
            if (filtered.length === 0) {
                alert("Please select at least one lesson!");
                cancelModal();
                return;
            }

            quizQueue = [...filtered].sort(() => Math.random() - 0.5);
            skipped = [];
            currentIndex = 0;
            correctCount = 0;
            incorrectCount = 0;

            document.getElementById('list-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            currentView = 'quiz';
            document.getElementById('toggle-text').textContent = 'Back to List';

            loadCurrentQuestion();
        }

        function hideModal() {
            document.getElementById('lesson-modal').classList.add('hidden');
        }

        function loadCurrentQuestion() {
            if (currentIndex >= quizQueue.length) {
                if (skipped.length > 0) {
                    quizQueue = [...quizQueue, ...skipped];
                    skipped = [];
                } else {
                    return showCompletionModal();
                }
            }

            currentItem = quizQueue[currentIndex];
            canSpeak = false;
            attempts = 0;

            const jpElement = document.getElementById('quiz-japanese');
            jpElement.textContent = currentItem.japanese;
            jpElement.classList.remove('clickable');

            document.getElementById('current-lesson').textContent = currentItem.lessonName;
            document.getElementById('input-romaji').value = '';
            document.getElementById('input-meaning').value = '';
            document.getElementById('feedback').classList.add('hidden');

            document.getElementById('check-btn').classList.remove('hidden');
            document.getElementById('skip-btn').classList.add('hidden');
            document.getElementById('reveal-btn').classList.add('hidden');

            updateStats();
        }

        function submitAnswer() {
            const userRomaji = document.getElementById('input-romaji').value.trim();
            const userMeaning = document.getElementById('input-meaning').value.trim();

            const correctRomaji = currentItem.romaji.toLowerCase();
            const romajiMatch = userRomaji.length > 1 && correctRomaji.includes(userRomaji.toLowerCase());
            const meaningMatch = isMatch(userMeaning, currentItem.meaningEnglish) || isMatch(userMeaning, currentItem.meaningBangla);

            attempts++;

            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');

            if (romajiMatch && meaningMatch) {
                feedback.innerHTML = `<div class="bg-green-100 text-green-700 p-6 rounded-2xl">✅ Correct!</div>`;
                correctCount++;
                canSpeak = true;
                document.getElementById('quiz-japanese').classList.add('clickable');
                speakJapanese(currentItem.japanese);
                setTimeout(nextQuestion, 1300);
            } else if (attempts >= 3) {
                feedback.innerHTML = `<div class="bg-red-100 text-red-700 p-6 rounded-2xl">❌ Out of attempts</div>`;
                incorrectCount++;
                document.getElementById('check-btn').classList.add('hidden');
                document.getElementById('skip-btn').classList.remove('hidden');
                document.getElementById('reveal-btn').classList.remove('hidden');
            } else {
                feedback.innerHTML = `<div class="bg-orange-100 text-orange-700 p-6 rounded-2xl">Try again • ${3 - attempts} left</div>`;
            }
            updateStats();
        }

        function skipWord() {
            skipped.push(currentItem);
            nextQuestion();
        }

        function revealAnswer() {
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('hidden');
            feedback.innerHTML = `
                <div class="bg-amber-50 border border-amber-300 p-8 rounded-2xl text-left">
                    <p class="font-medium text-amber-700 mb-3">Correct Answer:</p>
                    <p class="jp-font text-5xl mb-2">${currentItem.japanese}</p>
                    <p class="text-2xl">${currentItem.romaji}</p>
                    <p class="mt-4">${currentItem.meaningEnglish} / ${currentItem.meaningBangla}</p>
                    <button onclick="nextQuestion()" class="mt-8 w-full py-5 bg-amber-600 text-white rounded-3xl">Continue →</button>
                </div>`;
        }

        function nextQuestion() {
            currentIndex++;
            loadCurrentQuestion();
        }

        function updateStats() {
            const totalAttempted = correctCount + incorrectCount;
            const accuracy = totalAttempted === 0 ? 100 : Math.round((correctCount / totalAttempted) * 100);

            document.getElementById('correct-count').textContent = correctCount;
            document.getElementById('incorrect-count').textContent = incorrectCount;
            document.getElementById('accuracy').textContent = accuracy + '%';

            const total = quizQueue.length + skipped.length;
            const progress = Math.round((currentIndex / total) * 100) || 0;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${total}`;
        }

        function speakCurrent() {
            if (canSpeak && currentItem) speakJapanese(currentItem.japanese);
        }

        function showCompletionModal() {
            document.getElementById('final-correct').textContent = correctCount;
            document.getElementById('final-incorrect').textContent = incorrectCount;
            const total = correctCount + incorrectCount;
            const acc = total ? Math.round((correctCount / total) * 100) : 0;
            document.getElementById('final-accuracy').textContent = acc + '%';
            document.getElementById('completion-modal').classList.remove('hidden');
        }

        function retryQuiz() {
            document.getElementById('completion-modal').classList.add('hidden');
            const filtered = vocabData.filter(v => selectedLessons.has(v.lesson));
            quizQueue = [...filtered].sort(() => Math.random() - 0.5);
            skipped = [];
            currentIndex = 0;
            correctCount = 0;
            incorrectCount = 0;
            loadCurrentQuestion();
        }

        function chooseNewLessons() {
            document.getElementById('completion-modal').classList.add('hidden');
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('list-view').classList.remove('hidden');
            currentView = 'list';
            document.getElementById('lesson-modal').classList.remove('hidden');
        }

        function closeCompletionModal() {
            document.getElementById('completion-modal').classList.add('hidden');
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('list-view').classList.remove('hidden');
            currentView = 'list';
            document.getElementById('toggle-text').textContent = 'Start Quiz Mode';
        }

        function endQuiz() {
            if (confirm("Are you sure you want to end the quiz?")) {
                closeCompletionModal();
            }
        }

        function toggleAllLessons(selectAll) {
            if (selectAll) selectedLessons = new Set(vocabData.map(v => v.lesson));
            else selectedLessons.clear();
            renderLessonFilters();
            renderVocabList();
        }

        // Enter Key Navigation (Fixed)
        document.addEventListener('keydown', function(e) {
            if (currentView !== 'quiz') return;
            if (e.key !== 'Enter') return;

            const romajiField = document.getElementById('input-romaji');
            const meaningField = document.getElementById('input-meaning');
            const checkVisible = !document.getElementById('check-btn').classList.contains('hidden');
            const revealVisible = !document.getElementById('reveal-btn').classList.contains('hidden');
            const skipVisible = !document.getElementById('skip-btn').classList.contains('hidden');

            if (document.activeElement === romajiField) {
                meaningField.focus();
            } else {
                if (checkVisible) {
                    submitAnswer();
                } else if (revealVisible) {
                    revealAnswer();
                } else if (skipVisible) {
                    skipWord();
                }
            }
        });

        window.onload = () => {
            renderLessonFilters();
            renderVocabList();
            renderModalLessons();
        };
    </script>
</body>
